<div class="row mb-3">
  <div class="col-md-4">
    <select class="form-control" (change)="onCategoryChange($event.target.value)">
      <option value="">All Categories</option>
      <option *ngFor="let category of categories" [value]="category.categoryId">
        {{ category.name }}
      </option>
    </select>
  </div>
</div>
